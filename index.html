<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Музыкальный стриминг</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <div class="logo">🎵 MusicStream</div>
        <!-- Навигация удалена -->
    </header>

    <!-- Плеер -->
    <div class="player">
        <h2>🎧 Сейчас играет</h2>
        <div class="track-info">
            <div class="cover" id="track-cover"></div>
            <div>
                <div class="track-name" id="track-name">Загрузка...</div>
                <div class="track-artist" id="track-artist">...</div>
                <div class="track-actions">
                    <button id="like-btn" class="like-btn">❤️</button>
                    <button id="repeat-btn" class="repeat-btn">🔁</button>
                </div>
            </div>
        </div>
        <audio id="audio-player" controls></audio>
        <div class="controls">
            <button onclick="prevTrack()">⏮️ Предыдущий</button>
            <button onclick="nextTrack()">Следующий ⏭️</button>
        </div>
    </div>

    <!-- Панель управления плейлистом -->
    <div class="playlist-panel">
        <div class="all-tracks">
            <h3>🎵 Все треки</h3>
            <ul id="all-tracks-list"></ul>
        </div>
        <div class="my-playlist">
            <h3>📋 Мой плейлист</h3>
            <ul id="playlist-list"></ul>
            <button id="clear-playlist">Очистить плейлист</button>
        </div>
    </div>

    <!-- Секция с карточками плейлистов УДАЛЕНА -->

    <script src="script.js"></script>
</body>
</html>
