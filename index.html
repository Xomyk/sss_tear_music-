<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный стриминг</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">🎵 MusicStream</div>
        <nav>
            <a href="#">Главная</a>
            <a href="#">Плейлисты</a>
            <a href="#">Поиск</a>
        </nav>
    </header>

    <div class="player">
        <h2>🎧 Сейчас играет</h2>
        <div class="track-info">
            <div class="cover" style="background-image: url('https://via.placeholder.com/80');"></div>
            <div>
                <div class="track-name" id="track-name">Загрузка...</div>
                <div class="track-artist" id="track-artist">...</div>
            </div>
        </div>
        <audio id="audio-player" controls></audio>
    </div>

    <section class="playlists">
        <div class="playlist-card">
            <img src="https://via.placeholder.com/200x200/1db954/000?text=Плейлист+1" alt="Плейлист 1">
            <h3>Рок хиты</h3>
            <p>12 треков</p>
        </div>
        <div class="playlist-card">
            <img src="https://via.placeholder.com/200x200/1db954/000?text=Плейлист+2" alt="Плейлист 2">
            <h3>Для учёбы</h3>
            <p>8 треков</p>
        </div>
        <div class="playlist-card">
            <img src="https://via.placeholder.com/200x200/1db954/000?text=Плейлист+3" alt="Плейлист 3">
            <h3>Поп-музыка</h3>
            <p>15 треков</p>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
