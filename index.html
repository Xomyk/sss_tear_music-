<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный стриминг</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f0f0f0; }
        h1 { color: #1db954; }
        .player { background: white; padding: 20px; border-radius: 10px; max-width: 500px; }
        audio { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🎵 Музыкальный стриминг</h1>
    <div class="player">
        <p><strong>Сейчас играет:</strong> Пример трека — Исполнитель</p>
        <audio controls>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            Ваш браузер не поддерживает аудио.
        </audio>
    </div>
    <p>Добро пожаловать в мой стриминговый сервис!</p>
</body>
</html>
